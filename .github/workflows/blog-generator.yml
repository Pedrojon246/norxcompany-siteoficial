name: Gerador de Blog Norx

on:
  schedule:
    - cron: '0 11 */2 * *'
  workflow_dispatch:

jobs:
  gerar-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: blog-generator
        run: npm install

      - name: Gerar posts
        working-directory: blog-generator
        run: node scripts/generate-posts.js

      - name: Verificar mudancas
        id: check
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "Norx Blog Bot"
          git config user.email "bot@norxcompany.com.br"
          git add -A
          git commit -m "blog: novos posts automaticos"
          git push
